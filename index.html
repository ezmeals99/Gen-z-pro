<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Trades - Professional Scanner</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --dark-ash: #2b3139;
            --accent-color: #f0b90b;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --warning-color: #ffb100;
            --text-main: #eaecef;
            --text-dim: #848e9c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }

        /* --- Header & Layout --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .btn-main {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Grid System --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .card {
            background: var(--dark-ash);
            border-radius: 8px;
            padding: 12px;
            position: relative;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-3px); }

        .card-symbol { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .card-price { font-size: 18px; color: var(--accent-color); margin-bottom: 10px; }
        
        .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        /* --- Buttons --- */
        .btn-book {
            width: 100%;
            background: #444;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }

        .btn-book:hover { background: #555; }

        /* --- Modals --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            margin: 10% auto;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        .close-btn { float: right; cursor: pointer; font-size: 24px; color: var(--text-dim); }

        #customAlert {
            display: none;
            position: fixed;
            top: 20px; right: 20px;
            background: var(--success-color);
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 2000;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="customAlert">Trade Booked Successfully!</div>

<div class="header">
    <div>
        <h2 style="margin:0; color:var(--accent-color);">EZ TRADES</h2>
        <span style="font-size:12px; color:var(--text-dim);">Market Scanner 4H/1H</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn-main" onclick="startScanner()">🚀 SCAN NOW</button>
        <button style="background:#333; border:1px solid #555; color:#fff; padding:10px; border-radius:5px; cursor:pointer;" onclick="openBookedTrades()">📂 MY TRADES</button>
    </div>
</div>

<div id="status" style="font-size:13px; color:var(--warning-color); padding-left:10px;">System Ready. Press Scan.</div>

<div class="grid" id="mainGrid"></div>

<div id="tradesModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeBookedTrades()">&times;</span>
        <h3 style="color:var(--accent-color);">📂 TRACKED TRADES</h3>
        <div id="trackedGrid" style="max-height: 400px; overflow-y: auto;">
            </div>
    </div>
</div>

<script>
    const filteredCoins = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT", "ADAUSDT", "AVAXUSDT", "DOGEUSDT", "LINKUSDT", "NEARUSDT"];
    
    // --- Data Fetching ---
    async function fetchData(url) {
        try { const r = await fetch(url); return await r.json(); } catch(e) { return null; }
    }

    function calculateRSI(closes) {
        let gains = 0, losses = 0;
        for (let i = 1; i <= 14; i++) {
            let d = closes[i] - closes[i-1];
            if (d >= 0) gains += d; else losses -= d;
        }
        let avgG = gains/14, avgL = losses/14;
        for (let i = 15; i < closes.length; i++) {
            let d = closes[i] - closes[i-1];
            avgG = (avgG * 13 + (d > 0 ? d : 0)) / 14;
            avgL = (avgL * 13 + (d < 0 ? -d : 0)) / 14;
        }
        return 100 - (100 / (1 + avgG/avgL));
    }

    // --- Main Scanner Logic ---
    async function startScanner() {
        const grid = document.getElementById('mainGrid');
        const status = document.getElementById('status');
        grid.innerHTML = "";
        status.innerText = "Scanning 10+ Pairs for 90%+ setups...";

        let found = 0;
        for (let symbol of filteredCoins) {
            const data = await fetchData(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=50`);
            if (!data) continue;

            const closes = data.map(d => parseFloat(d[4]));
            const curPrice = closes[closes.length-1];
            const sma50 = closes.reduce((a,b) => a+b, 0) / closes.length;
            const rsi = calculateRSI(closes);

            // Signal Logic
            let trend = "";
            if (curPrice > sma50 && rsi < 35) trend = "BUY";
            else if (curPrice < sma50 && rsi > 65) trend = "SELL";

            if (trend) {
                found++;
                const tp = trend === "BUY" ? curPrice * 1.03 : curPrice * 0.97;
                const sl = trend === "BUY" ? curPrice * 0.98 : curPrice * 1.02;
                renderCard(grid, symbol, curPrice, tp, sl, trend);
            }
        }
        status.innerText = `Scan Complete. Found ${found} high probability trades.`;
    }

    function renderCard(target, symbol, price, tp, sl, trend) {
        const color = trend === "BUY" ? "var(--success-color)" : "var(--danger-color)";
        target.innerHTML += `
            <div class="card" style="border-top: 3px solid ${color}">
                <span class="status-badge" style="background:${color}; color:#000;">${trend}</span>
                <div class="card-symbol">${symbol.replace("USDT", "")}</div>
                <div class="card-price">$${price.toFixed(price < 1 ? 4 : 2)}</div>
                <div style="font-size:10px; color:var(--text-dim); margin-bottom:10px;">
                    TP: ${tp.toFixed(2)}<br>SL: ${sl.toFixed(2)}
                </div>
                <button class="btn-book" onclick="bookTrade('${symbol}', ${price}, ${tp}, ${sl}, '${trend}')">📌 BOOK TRADE</button>
            </div>
        `;
    }

    // --- Trade Management ---
    function bookTrade(symbol, entry, tp, sl, trend) {
        const user = localStorage.getItem('current_user') || 'default';
        const tradeKey = `trades_${user}`;
        let trades = JSON.parse(localStorage.getItem(tradeKey) || '[]');
        
        trades.push({
            symbol, entry, tp, sl, trend,
            status: "ON GOING",
            time: new Date().toLocaleTimeString()
        });

        localStorage.setItem(tradeKey, JSON.stringify(trades));
        showTopAlert(`✅ ${symbol} Trade Booked!`);
    }

    async function loadTrackedTrades() {
        const user = localStorage.getItem('current_user') || 'default';
        const tradeKey = `trades_${user}`;
        let trades = JSON.parse(localStorage.getItem(tradeKey) || '[]');
        const grid = document.getElementById('trackedGrid');
        
        if (trades.length === 0) {
            grid.innerHTML = "<p style='color:#666;'>No trades tracked yet.</p>";
            return;
        }

        grid.innerHTML = "<p style='font-size:12px; color:orange;'>Updating live prices...</p>";
        let html = "";

        for (let i = 0; i < trades.length; i++) {
            let t = trades[i];
            const ticker = await fetchData(`https://api.binance.com/api/v3/ticker/price?symbol=${t.symbol}`);
            const livePrice = ticker ? parseFloat(ticker.price) : 0;

            // Live TP/SL logic
            if (t.status === "ON GOING" && livePrice > 0) {
                if (t.trend === "BUY") {
                    if (livePrice >= t.tp) t.status = "TP HIT ✅";
                    else if (livePrice <= t.sl) t.status = "SL HIT ❌";
                } else {
                    if (livePrice <= t.tp) t.status = "TP HIT ✅";
                    else if (livePrice >= t.sl) t.status = "SL HIT ❌";
                }
                trades[i] = t;
                localStorage.setItem(tradeKey, JSON.stringify(trades));
            }

            html += `
                <div style="background:#2b3139; padding:10px; border-radius:8px; margin-bottom:10px; border-left:4px solid ${t.trend==='BUY'?'#0ecb81':'#f6465d'}">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${t.symbol}</b>
                        <span style="font-size:11px; color:var(--accent-color)">${t.status}</span>
                    </div>
                    <div style="font-size:12px; margin-top:5px;">
                        Entry: $${t.entry.toFixed(2)} | Live: $${livePrice.toFixed(2)}
                    </div>
                    <button onclick="deleteTrade(${i})" style="background:transparent; color:red; border:none; cursor:pointer; font-size:10px; margin-top:5px;">[ Remove ]</button>
                </div>
            `;
        }
        grid.innerHTML = html;
    }

    function deleteTrade(index) {
        const user = localStorage.getItem('current_user') || 'default';
        const tradeKey = `trades_${user}`;
        let trades = JSON.parse(localStorage.getItem(tradeKey) || '[]');
        trades.splice(index, 1);
        localStorage.setItem(tradeKey, JSON.stringify(trades));
        loadTrackedTrades();
    }

    // --- UI Helpers ---
    function showTopAlert(msg) {
        const a = document.getElementById('customAlert');
        a.innerText = msg; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 3000);
    }
    function openBookedTrades() { document.getElementById('tradesModal').style.display='block'; loadTrackedTrades(); }
    function closeBookedTrades() { document.getElementById('tradesModal').style.display='none'; }

    // Auto-update prices every 60 seconds if modal is open
    setInterval(() => {
        if(document.getElementById('tradesModal').style.display === 'block') loadTrackedTrades();
    }, 60000);

</script>
</body>
</html>
