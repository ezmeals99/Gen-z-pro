<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GenZ Pro Scanner - Normal Mode</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --accent-color: #fcd535;
            --text-color: #eaecef;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --warning-color: #f0b90b;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* --- 🛠️ Header --- */
        .header {
            background-color: var(--container-bg);
            padding: 10px 15px;
            border-bottom: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .header-title-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        .header h2 span {
            color: var(--accent-color);
        }

        .header-actions {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding-bottom: 5px;
        }

        button {
            transition: transform 0.1s ease;
            outline: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 12px;
            padding: 8px 12px;
            box-sizing: border-box;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-logout {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .scan-wrapper {
            position: relative;
        }

        .btn-scan-mode {
            background-color: var(--accent-color);
            color: #000;
        }

        .red-dot {
            display: none;
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            border: 2px solid var(--container-bg);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .user-icon {
            width: 32px;
            height: 32px;
            background-color: #2b3139;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #444;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .user-icon:hover {
            border-color: var(--accent-color);
            background-color: var(--container-bg);
        }

        .user-icon svg {
            fill: var(--accent-color);
            width: 16px;
            height: 16px;
        }

        /* --- 🕹️ Controls --- */
        .controls {
            margin: 15px auto;
            padding: 15px;
            background-color: var(--container-bg);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 90%;
            border: 1px solid var(--border-color);
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .controls label {
            font-size: 10px;
            color: #848e9c;
        }

        .controls select {
            background-color: #2b3139;
            color: white;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 5px;
            font-size: 12px;
        }

        /* --- 🚀 Grid & Cards --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            padding: 10px;
            box-sizing: border-box;
            width: 100%;
        }

        .card {
            background-color: var(--container-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: left;
            position: relative;
        }

        .card-symbol {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .card-price {
            font-size: 22px;
            font-weight: bold;
            margin: 6px 0;
        }

        .targets {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .btn-book {
            width: 100%;
            background-color: var(--success-color);
            color: #000;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }

        .status-badge {
            float: right;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 4px;
        }

        /* --- 🔐 Login & Modal --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 17, 0.98);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .login-box {
            background-color: var(--container-bg); padding: 25px; border-radius: 12px;
            border: 2px solid var(--accent-color); width: 80%; max-width: 300px; text-align: center;
        }

        .login-box input {
            width: 100%; padding: 8px; margin: 8px 0; border-radius: 5px; border: 1px solid #444;
            background-color: #2b3139; color: white; box-sizing: border-box; font-size: 14px;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 17, 0.98); z-index: 2000; overflow-y: auto;
        }

        .modal-content {
            max-width: 90%; margin: 20px auto; padding: 10px;
            background-color: var(--container-bg); border-radius: 12px; border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 10px;
        }

        .close-btn { color: #848e9c; font-size: 24px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) {
            .header-actions { justify-content: space-between; }
            .controls { flex-direction: row; justify-content: space-around; max-width: 95%; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--accent-color); margin-top:0; font-size: 20px;">GEN Z LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button style="background-color:var(--accent-color); width:100%; margin-top:10px;" onclick="attemptLogin()">LOGIN</button>
        <button style="background:transparent; color:var(--accent-color); border:1px solid var(--accent-color); width:100%; margin-top:5px;" onclick="attemptCreate()">CREATE ACCOUNT</button>
        <div id="loginMsg" style="color:var(--danger-color); font-size:11px; margin-top:10px;"></div>
    </div>
</div>

<div id="appContent" style="display: none;">
    <div class="header">
        <div class="header-title-row">
            <h2>GEN Z PRO <span>NORMAL MODE</span></h2>
        </div>
        <div class="header-actions">
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
            
            <div class="scan-wrapper">
                <button class="btn-scan-mode" onclick="startNormalScanner()">SCAN NOW</button>
                <div id="notifDot" class="red-dot"></div>
            </div>

            <div class="user-icon" onclick="openBookedTrades()" title="My Booked Trades">
                <svg viewBox="0 0 24 24">
                    <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>TIME FRAME</label>
            <select id="tf-select">
                <option value="15m">15-Minute</option>
                <option value="1h" selected>1-Hour</option>
                <option value="4h">4-Hour</option>
            </select>
        </div>
    </div>

    <div id="status" style="color:var(--accent-color); font-size:11px; margin-bottom:10px;">Ready to Scan for Normal Trades...</div>
    
    <div class="grid" id="mainGrid">
        <div style="color:#848e9c; font-size:12px; grid-column:1/-1;">Press SCAN NOW or Wait for Signals...</div>
    </div>
</div>

<div id="tradesModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="color:var(--accent-color); margin:0; font-size:16px;">📂 MY BOOKED TRADES</h3>
            <span class="close-btn" onclick="closeBookedTrades()">&times;</span>
        </div>
        <div class="grid" id="trackedGrid" style="padding:0;"></div>
    </div>
</div>

<script>
    let normalInterval;
    let receivedSignals = [];

    const filteredCoins = [
        "BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT", "ADAUSDT", "AVAXUSDT", 
        "DOGEUSDT", "LINKUSDT", "SHIBUSDT", "SUIUSDT", "NEARUSDT", "FILUSDT", "MATICUSDT", 
        "DOTUSDT", "LTCUSDT", "UNIUSDT", "OPUSDT", "ARBUSDT", "APTUSDT", "STXUSDT", 
        "RNDRUSDT", "FETUSDT", "INJUSDT", "TIAUSDT", "GALAUSDT", "PEPEUSDT", "WLDUSDT", 
        "ORDIUSDT", "SEIUSDT", "ARKMUSDT", "BCHUSDT", "TRXUSDT", "AAVEUSDT", "NILUSDT"
    ];

    window.onload = function() {
        if (!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify([{u: "alex", p: "123"}]));
        if (localStorage.getItem('current_user')) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }
            
            startNormalScanner(); 
        }
    };

    function attemptLogin() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.find(user => user.u === u && user.p === p)) {
            localStorage.setItem('current_user', u);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }
            
            startNormalScanner();
        } else { document.getElementById('loginMsg').innerText = "Invalid credentials!"; }
    }

    function attemptCreate() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        if (!u || !p) return;
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.some(user => user.u === u)) { document.getElementById('loginMsg').innerText = "Username exists!"; return; }
        users.push({u, p}); localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('current_user', u); location.reload();
    }
    
    function logout() { localStorage.removeItem('current_user'); location.reload(); }

    async function getCandles(symbol, interval) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
            return (await res.json()).map(d => ({close: parseFloat(d[4]), high: parseFloat(d[2]), low: parseFloat(d[3])}));
        } catch (e) { return null; }
    }

    async function getCurrentPrice(symbol) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
            const data = await res.json();
            return parseFloat(data.price);
        } catch (e) { return null; }
    }

    function calculateRSI(closes, period = 14) {
        let gains = 0, losses = 0;
        for (let i = 1; i <= period; i++) {
            let diff = closes[i] - closes[i - 1];
            if (diff >= 0) gains += diff; else losses -= diff;
        }
        let avgGain = gains / period, avgLoss = losses / period;
        for (let i = period + 1; i < closes.length; i++) {
            let diff = closes[i] - closes[i - 1], gain = diff >= 0 ? diff : 0, loss = diff < 0 ? -diff : 0;
            avgGain = (avgGain * (period - 1) + gain) / period; avgLoss = (avgLoss * (period - 1) + loss) / period;
        }
        return avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
    }

    function startNormalScanner() {
        if (normalInterval) clearInterval(normalInterval);
        document.getElementById('status').innerText = "Scanning 35 Coins for Normal Strategy...";
        runNormalScan();
        normalInterval = setInterval(runNormalScan, 180000); 
    }

    async function runNormalScan() {
        const grid = document.getElementById('mainGrid'), tf = document.getElementById('tf-select').value;
        grid.innerHTML = "";
        let found = 0;

        for (let symbol of filteredCoins) {
            const candles = await getCandles(symbol, tf);
            if (!candles || candles.length < 50) continue;

            const closes = candles.map(c => c.close), cur = closes[closes.length-1];
            const sum50 = closes.slice(-50).reduce((a,b)=>a+b, 0), sma50 = sum50 / 50;
            const rsi = calculateRSI(closes, 14);

            let tradeType = "";
            let color = "var(--success-color)";

            if (rsi < 40 && cur > sma50) {
                tradeType = "BUY";
                color = "var(--success-color)";
            } else if (rsi > 60 && cur < sma50) {
                tradeType = "SELL";
                color = "var(--danger-color)";
            }

            if (tradeType !== "") {
                found++;
                let sumVol = 0; candles.slice(-14).forEach(c => sumVol += (c.high - c.low)); const volatility = sumVol / 14;
                
                const tp = tradeType === "BUY" ? cur + (volatility * 2.5) : cur - (volatility * 2.5);
                const sl = tradeType === "BUY" ? cur - (volatility * 1.5) : cur + (volatility * 1.5);
                
                const earnPercent = (((Math.abs(tp - cur)) / cur) * 100).toFixed(2);

                grid.innerHTML += `
                    <div class="card" style="border-top: 3px solid ${color}">
                        <div style="float:right; color:var(--accent-color); font-size:11px;">85%+ Win Rate</div>
                        <div class="card-symbol">${symbol.replace("USDT", "")}/USDT</div>
                        <div style="font-size:12px; font-weight:bold; color:${color};">${tradeType} SIGNAL</div>
                        <div class="card-price">$${cur.toFixed(symbol.includes('SHIB') || symbol.includes('PEPE') ? 6 : 4)}</div>
                        <div class="targets">
                            <div class="row">Est. Profit <span style="color:#0ecb81">+${earnPercent}%</span></div>
                            <div class="row">TP: <span>$${tp.toFixed(symbol.includes('SHIB') || symbol.includes('PEPE') ? 6 : 4)}</span></div>
                            <div class="row">SL: <span>$${sl.toFixed(symbol.includes('SHIB') || symbol.includes('PEPE') ? 6 : 4)}</span></div>
                        </div>
                        <button class="btn-book" onclick="bookTrade('${symbol.replace("USDT", "")}', ${cur}, ${tp}, ${sl}, '${tradeType}')">📌 BOOK TRADE</button>
                    </div>
                `;
                
                let cleanSymbol = symbol.replace("USDT", "");
                if (!receivedSignals.includes(cleanSymbol)) {
                    receivedSignals.push(cleanSymbol);
                    document.getElementById('notif-sound').play();
                    document.getElementById('notifDot').style.display = "block";
                    
                    if (Notification.permission === "granted") {
                        new Notification(`🚨 New Normal Signal!`, {
                            body: `${cleanSymbol} is ready for a ${tradeType}. Est Profit: +${earnPercent}%`,
                            icon: "https://bin.bnbstatic.com/static/images/common/favicon.ico"
                        });
                    }
                }
            }
        }

        if (found > 0) {
             document.getElementById('status').innerText = `Scan complete. Found ${found} trades.`;
        } else {
             document.getElementById('notifDot').style.display = "none";
             grid.innerHTML = `<div style="color:#848e9c; font-size:12px; grid-column:1/-1;">No signals detected at this moment.</div>`;
             document.getElementById('status').innerText = "Scan complete. No matches found.";
             receivedSignals = []; 
        }
    }

    // --- 📂 BOOKED TRADES SYSTEM WITH LIVE STATUS ---
    function bookTrade(symbol, entry, tp, sl, trend) {
        const tradeKey = `trades_${localStorage.getItem('current_user')}`;
        let trades = JSON.parse(localStorage.getItem(tradeKey) || '[]');
        
        trades.push({ 
            symbol, 
            entry, 
            tp, 
            sl, 
            trend, 
            status: "ON GOING", // Default Status
            time: new Date().toLocaleString() 
        });
        
        localStorage.setItem(tradeKey, JSON.stringify(trades)); 
        alert(`✅ ${symbol} Trade Booked Successfully! Check "My Booked Trades" folder.`);
    }

    function openBookedTrades() { 
        document.getElementById('tradesModal').style.display = 'block'; 
        loadTrackedTrades(); 
    }
    
    function closeBookedTrades() { 
        document.getElementById('tradesModal').style.display = 'none'; 
    }

    async function loadTrackedTrades() {
        const tradeKey = `trades_${localStorage.getItem('current_user')}`;
        let trades = JSON.parse(localStorage.getItem(tradeKey) || '[]');
        const trackedGrid = document.getElementById('trackedGrid'); 
        trackedGrid.innerHTML = "<div style='color:var(--accent-color); font-size:12px; grid-column:1/-1;'>Updating prices and checking TP/SL...</div>";
        
        if (trades.length === 0) { 
            trackedGrid.innerHTML = `<div style="color:#848e9c; font-size:12px; grid-column:1/-1;">No trades booked.</div>`; 
            return; 
        }
        
        trackedGrid.innerHTML = "";
        
        for (let i = 0; i < trades.length; i++) {
            let t = trades[i];
            
            // On Going ට්‍රේඩ් වල විතරක් අලුත් මිල Binance එකෙන් ගන්නවා
            if (t.status === "ON GOING") {
                const livePrice = await getCurrentPrice(t.symbol + "USDT");
                if (livePrice) {
                    if (t.trend === "BUY") {
                        if (livePrice >= t.tp) t.status = "TP HIT";
                        else if (livePrice <= t.sl) t.status = "SL HIT";
                    } else if (t.trend === "SELL") {
                        if (livePrice <= t.tp) t.status = "TP HIT";
                        else if (livePrice >= t.sl) t.status = "SL HIT";
                    }
                    // Local Storage එක Update කරනවා
                    trades[i] = t;
                    localStorage.setItem(tradeKey, JSON.stringify(trades));
                }
            }
            
            // Badge එකේ පාට තීරණය කිරීම
            let badgeColor, badgeBg;
            if (t.status === "TP HIT") { badgeColor = "#000"; badgeBg = "var(--success-color)"; }
            else if (t.status === "SL HIT") { badgeColor = "#fff"; badgeBg = "var(--danger-color)"; }
            else { badgeColor = "#000"; badgeBg = "var(--warning-color)"; }
            
            let color = (t.trend.includes('BUY')) ? 'var(--success-color)' : 'var(--danger-color)';
            
            trackedGrid.innerHTML += `
                <div class="card" style="border-left: 3px solid ${color};">
                    <span class="status-badge" style="background-color:${badgeBg}; color:${badgeColor};">${t.status}</span>
                    <div style="font-size:14px; font-weight:bold">${t.symbol}/USDT</div>
                    <div style="font-size:11px; color:${color}; font-weight:bold;">${t.trend}</div>
                    <div style="font-size:11px;">Entry: $${t.entry.toFixed(4)}</div>
                    <div style="font-size:10px; color:#848e9c;">TP: $${t.tp.toFixed(4)} | SL: $${t.sl.toFixed(4)}</div>
                    <div style="font-size:9px; color:#555; margin-top:5px;">${t.time}</div>
                    <button style="background:transparent; color:var(--danger-color); font-size:10px; padding:2px 5px; margin-top:5px; border:1px solid var(--danger-color);" onclick="deleteTrade(${i})">Delete</button>
                </div>`;
        }
    }

    // ට්‍රේඩ් එකක් ලිස්ට් එකෙන් අයින් කරන්න
    function deleteTrade(index) {
        const tradeKey = `trades_${localStorage.getItem('current_user')}`;
        let trades = JSON.parse(localStorage.getItem(tradeKey) || '[]');
        trades.splice(index, 1);
        localStorage.setItem(tradeKey, JSON.stringify(trades));
        loadTrackedTrades();
    }
</script>

</body>
</html>
