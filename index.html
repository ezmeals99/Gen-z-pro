<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GenZ Pro - Multi Scanner</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --accent-color: #fcd535;
            --text-color: #eaecef;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --warning-color: #f0b90b;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; text-align: center; overflow-x: hidden;
        }

        /* --- UI COMPONENTS (As per your provided CSS) --- */
        .header { background-color: var(--container-bg); padding: 10px 15px; border-bottom: 4px solid var(--accent-color); display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .header-title-row { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 18px; color: var(--text-color); }
        .header-actions { width: 100%; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; padding-bottom: 5px; }
        
        button { border-radius: 6px; font-weight: bold; cursor: pointer; border: none; font-size: 12px; padding: 8px 12px; transition: 0.1s; }
        button:active { transform: scale(0.95); }
        
        .btn-logout { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); }
        .btn-long-term { background-color: var(--success-color); color: #000; }
        .btn-notif { background-color: #2b3139; color: var(--text-color); border: 1px solid #444; display: flex; align-items: center; gap: 5px; }
        .btn-scan { background-color: var(--accent-color); color: #000; padding: 12px 0; border-radius: 30px; font-weight: bold; width: 70%; max-width: 250px; display: block; margin: 15px auto; }
        
        .red-dot { display: none; position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; background-color: #ff4d4d; border-radius: 50%; border: 2px solid var(--container-bg); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .long-term-wrapper { position: relative; }

        .search-input { padding: 8px; border-radius: 6px; border: 1px solid #444; background-color: #2b3139; color: white; width: 100px; font-size: 12px; }
        .user-icon { width: 32px; height: 32px; background-color: #2b3139; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid #444; flex-shrink: 0; }
        .user-icon svg { fill: var(--accent-color); width: 16px; height: 16px; }

        .controls { margin: 15px auto; padding: 15px; background-color: var(--container-bg); border-radius: 10px; display: flex; justify-content: center; gap: 15px; max-width: 90%; border: 1px solid var(--border-color); flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .controls label { font-size: 10px; color: #848e9c; }
        .controls input, .controls select { background-color: #2b3139; color: white; border: 1px solid #444; padding: 6px; border-radius: 5px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 10px; }
        .card { background-color: var(--container-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); text-align: left; position: relative; }
        .card-symbol { font-size: 16px; font-weight: bold; }
        .card-price { font-size: 22px; font-weight: bold; margin: 6px 0; }
        .targets { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: 8px; }
        .row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .btn-book { width: 100%; background-color: var(--success-color); color: #000; padding: 8px; border-radius: 6px; font-weight: bold; margin-top: 10px; }

        /* --- Modals & Overlays --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 14, 17, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background-color: var(--container-bg); padding: 25px; border-radius: 12px; border: 2px solid var(--accent-color); width: 80%; max-width: 300px; }
        .login-box input { width: 100%; padding: 8px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #2b3139; color: white; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 14, 17, 0.98); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 90%; margin: 20px auto; padding: 15px; background-color: var(--container-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 10px; }
        .close-btn { color: #848e9c; font-size: 24px; cursor: pointer; }
        
        #customAlert { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: var(--container-bg); color: white; padding: 12px 20px; border-radius: 8px; border: 2px solid var(--success-color); z-index: 3000; font-weight: bold; min-width: 250px; }
        .status-badge { float: right; font-size: 11px; font-weight: bold; padding: 3px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
<div id="customAlert"></div>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--accent-color); margin-top:0;">GEN Z LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button style="background-color:var(--accent-color); width:100%; margin-top:10px;" onclick="attemptLogin()">LOGIN</button>
        <button style="background:transparent; color:var(--accent-color); border:1px solid var(--accent-color); width:100%; margin-top:5px;" onclick="attemptCreate()">CREATE ACCOUNT</button>
        <div id="loginMsg" style="color:var(--danger-color); font-size:11px; margin-top:10px;"></div>
    </div>
</div>

<div id="appContent" style="display: none;">
    <div class="header">
        <div class="header-title-row">
            <h2>GEN Z <span>PRO</span></h2>
            <div class="user-icon" onclick="openBookedTrades()">
                <svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z" /></svg>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
            <div class="long-term-wrapper">
                <button class="btn-long-term" onclick="openLongTermModal()">LONG TERM</button>
                <div id="notifDot" class="red-dot"></div>
            </div>
            <div class="long-term-wrapper">
                <button class="btn-notif" onclick="openNotifModal()">🔔 <span>NOTIFS</span></button>
                <div id="bellDot" class="red-dot"></div>
            </div>
            <div class="search-container">
                <input type="text" id="sCoin" class="search-input" placeholder="BTC...">
                <button style="background:var(--accent-color); color:black;" onclick="searchCoin()">SEARCH</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>WALLET (USDT)</label>
            <input type="number" id="wallet" value="100">
        </div>
        <div class="control-group">
            <label>LEV: <span id="levVal" style="color:var(--accent-color);">15x</span></label>
            <input type="range" id="lev" min="5" max="50" value="15" oninput="document.getElementById('levVal').innerText = this.value + 'x'">
        </div>
        <div class="control-group">
            <label>TF</label>
            <select id="tf">
                <option value="15m">15m</option>
                <option value="1h" selected>1h</option>
                <option value="4h">4h</option>
            </select>
        </div>
    </div>

    <button class="btn-scan" onclick="runMainScan()">SCAN MARKET</button>
    <div id="status" style="color:var(--accent-color); font-size:11px; margin-bottom:10px;">Ready to Scan...</div>
    
    <div class="grid" id="grid">
        <div style="color:#848e9c; font-size:12px; grid-column:1/-1;">Press Scan to find 85%+ Accuracy trades.</div>
    </div>
</div>

<div id="tradesModal" class="modal"><div class="modal-content">
    <div class="modal-header"><h3>📂 MY BOOKED TRADES</h3><span class="close-btn" onclick="closeModal('tradesModal')">&times;</span></div>
    <div class="grid" id="trackedGrid"></div>
</div></div>

<div id="notifModal" class="modal"><div class="modal-content">
    <div class="modal-header"><h3>🔔 SIGNAL HISTORY</h3><span class="close-btn" onclick="closeModal('notifModal')">&times;</span></div>
    <div id="notifGrid" class="grid"></div>
</div></div>

<div id="longTermModal" class="modal"><div class="modal-content">
    <div class="modal-header"><h3>🚀 LONG TERM BUYS</h3><span class="close-btn" onclick="closeModal('longTermModal')">&times;</span></div>
    <div id="longTermGrid" class="grid"></div>
</div></div>

<script>
    let currentUser = "";
    let receivedSignals = [];
    const coins = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT", "ADAUSDT", "AVAXUSDT", "DOGEUSDT", "LINKUSDT", "NEARUSDT", "SUIUSDT"];

    // --- Auth Logic ---
    function attemptLogin() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        const users = JSON.parse(localStorage.getItem('genz_users') || '[{"u":"admin","p":"123"}]');
        if (users.find(user => user.u === u && user.p === p)) {
            currentUser = u; localStorage.setItem('genz_current', u);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            showAlert("Welcome back!");
        } else { document.getElementById('loginMsg').innerText = "Wrong Details!"; }
    }

    function attemptCreate() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        if(!u || !p) return;
        let users = JSON.parse(localStorage.getItem('genz_users') || '[]');
        users.push({u, p}); localStorage.setItem('genz_users', JSON.stringify(users));
        alert("Account Created! Login Now.");
    }

    function logout() { localStorage.removeItem('genz_current'); location.reload(); }

    // --- Market Logic ---
    async function api(path) { try { const r = await fetch(`https://api.binance.com/api/v3/${path}`); return await r.json(); } catch(e) { return null; } }

    async function runMainScan() {
        const grid = document.getElementById('grid'), tf = document.getElementById('tf').value;
        grid.innerHTML = "<p style='color:orange'>Analysing Trends...</p>";
        let found = 0;
        
        for(let s of coins) {
            const data = await api(`klines?symbol=${s}&interval=${tf}&limit=100`);
            if(!data) continue;
            const closes = data.map(d => parseFloat(d[4]));
            const cur = closes[99];
            const rsi = calcRSI(closes);
            const sma = closes.reduce((a,b)=>a+b,0)/100;

            let trend = "";
            if(cur > sma && rsi < 38) trend = "BUY";
            else if(cur < sma && rsi > 62) trend = "SELL";

            if(trend) {
                found++;
                grid.innerHTML = (found === 1 ? "" : grid.innerHTML) + renderCard(s, cur, trend, 88);
                if(!receivedSignals.some(sig => sig.s === s)) {
                    addSignal(s, trend, rsi, cur);
                }
            }
        }
        if(found === 0) grid.innerHTML = "No high accuracy signals. Try another Timeframe.";
        document.getElementById('status').innerText = `Scan Finished. Found ${found} Trades.`;
    }

    function renderCard(s, price, trend, acc) {
        const color = trend === 'BUY' ? 'var(--success-color)' : 'var(--danger-color)';
        const tp = trend === 'BUY' ? price * 1.03 : price * 0.97;
        const sl = trend === 'BUY' ? price * 0.98 : price * 1.02;
        return `
            <div class="card" style="border-top: 3px solid ${color}">
                <div class="status-badge" style="background:${color}; color:#000;">${acc}% WIN</div>
                <div class="card-symbol">${s}</div>
                <div style="color:${color}; font-weight:bold;">${trend} SIGNAL</div>
                <div class="card-price">$${price.toFixed(4)}</div>
                <div class="targets">
                    <div class="row">Target TP <span>$${tp.toFixed(4)}</span></div>
                    <div class="row">Stop Loss <span>$${sl.toFixed(4)}</span></div>
                </div>
                <button class="btn-book" onclick="bookTrade('${s}',${price},${tp},${sl},'${trend}')">📌 BOOK TRADE</button>
            </div>
        `;
    }

    function calcRSI(closes) {
        let u=0, d=0;
        for(let i=85; i<99; i++) {
            let diff = closes[i+1]-closes[i];
            if(diff>0) u+=diff; else d-=diff;
        }
        return 100 - (100/(1+(u/d)));
    }

    function addSignal(s, t, r, p) {
        receivedSignals.unshift({s, t, r, p, time: new Date().toLocaleTimeString()});
        document.getElementById('bellDot').style.display = "block";
        document.getElementById('notif-sound').play();
    }

    function bookTrade(symbol, entry, tp, sl, trend) {
        const key = `trades_${localStorage.getItem('genz_current')}`;
        let trades = JSON.parse(localStorage.getItem(key) || '[]');
        trades.unshift({ symbol, entry, tp, sl, trend, status: "ON GOING", time: new Date().toLocaleString() });
        localStorage.setItem(key, JSON.stringify(trades));
        showAlert("✅ Trade Booked Successfully!");
    }

    async function openBookedTrades() {
        document.getElementById('tradesModal').style.display = 'block';
        const grid = document.getElementById('trackedGrid');
        const trades = JSON.parse(localStorage.getItem(`trades_${localStorage.getItem('genz_current')}`) || '[]');
        grid.innerHTML = trades.length ? "" : "No Trades Booked.";
        for(let t of trades) {
            grid.innerHTML += `
                <div class="card" style="border-left:4px solid ${t.trend==='BUY'?'#0ecb81':'#f6465d'}">
                    <div class="card-symbol">${t.symbol} <small style="font-size:9px; color:#848e9c;">${t.time}</small></div>
                    <div style="font-size:12px;">Entry: $${t.entry} | Trend: ${t.trend}</div>
                    <div style="font-size:10px; color:var(--accent-color);">Status: ${t.status}</div>
                </div>
            `;
        }
    }

    function showAlert(m) {
        const a = document.getElementById('customAlert'); a.innerText = m; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 3000);
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openNotifModal() { document.getElementById('notifModal').style.display='block'; document.getElementById('bellDot').style.display='none'; }
    function openLongTermModal() { document.getElementById('longTermModal').style.display='block'; }
</script>

</body>
</html>
