<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Scanner with Alerts</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --success-color: #238636;
            --danger-color: #da3637;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
        }

        .notification-btn {
            display: block;
            margin: 10px auto;
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }

        th {
            background-color: #21262d;
            color: var(--accent-color);
        }

        .buy-signal {
            background-color: rgba(35, 134, 54, 0.2);
            color: #3fb950;
            font-weight: bold;
        }

        .sell-signal {
            background-color: rgba(218, 54, 55, 0.2);
            color: #f85149;
            font-weight: bold;
        }

        .status {
            text-align: center;
            font-style: italic;
            color: #8b949e;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Advanced Crypto Market Scanner</h1>
        <button id="notif-btn" class="notification-btn">Enable Desktop Notifications</button>
        
        <div class="status" id="status-text">Scanner is initializing...</div>

        <table>
            <thead>
                <tr>
                    <th>Coin</th>
                    <th>Price</th>
                    <th>RSI (14)</th>
                    <th>SMA 50</th>
                    <th>Signal</th>
                    <th>Suggested TP / SL</th>
                </tr>
            </thead>
            <tbody id="crypto-table-body">
                </tbody>
        </table>
    </div>

    <audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script>
        // Full List of Coins based on your request (excluding invalid/delisted ones on Binance spot)
        const bestCoins = [
            "BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "ADAUSDT", "XRPUSDT",
            "DOGEUSDT", "SHIBUSDT", "NEARUSDT", "AVAXUSDT", "LINKUSDT", "SUIUSDT",
            "PEPEUSDT", "TRXUSDT", "UNIUSDT", "ATOMUSDT", "THETAUSDT", "CRVUSDT"
        ];

        const tableBody = document.getElementById('crypto-table-body');
        const statusText = document.getElementById('status-text');
        const notifBtn = document.getElementById('notif-btn');
        const notifSound = document.getElementById('notif-sound');

        // Notification Permission Handler
        notifBtn.addEventListener('click', () => {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    alert('Notifications enabled successfully!');
                    notifBtn.style.display = 'none';
                }
            });
        });

        // Hide button if permission is already granted
        if (Notification.permission === 'granted') {
            notifBtn.style.display = 'none';
        }

        // Play alert sound and show desktop notification
        function triggerAlert(coin, signalType, price) {
            notifSound.play();

            if (Notification.permission === 'granted') {
                new Notification(`Crypto Signal: ${coin}`, {
                    body: `${signalType.toUpperCase()} Signal detected at $${price}!`,
                    icon: 'https://bin.arnu.sh/binance.png' // Fallback icon
                });
            }
        }

        // Fetch Data and Calculate Indicators
        async function scanMarket() {
            statusText.innerText = "Scanning Binance Market...";
            tableBody.innerHTML = ''; // Clear previous

            for (const coin of bestCoins) {
                try {
                    // Fetch 50 hourly candles for SMA and RSI calculation
                    const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}&interval=1h&limit=50`);
                    const data = await response.json();

                    const closes = data.map(candle => parseFloat(candle[4]));
                    const currentPrice = closes[closes.length - 1];

                    const rsi = calculateRSI(closes, 14);
                    const sma50 = calculateSMA(closes, 50);

                    let signal = "Neutral";
                    let rowClass = "";
                    let tpSl = "N/A";

                    // Buy Signal Logic
                    if (rsi < 30 && currentPrice > sma50) {
                        signal = "STRONG BUY";
                        rowClass = "buy-signal";
                        tpSl = `TP: ${(currentPrice * 1.03).toFixed(4)} / SL: ${(currentPrice * 0.98).toFixed(4)}`;
                        triggerAlert(coin, "Buy", currentPrice);
                    } 
                    // Sell Signal Logic
                    else if (rsi > 70 && currentPrice < sma50) {
                        signal = "STRONG SELL";
                        rowClass = "sell-signal";
                        tpSl = `TP: ${(currentPrice * 0.97).toFixed(4)} / SL: ${(currentPrice * 1.02).toFixed(4)}`;
                        triggerAlert(coin, "Sell", currentPrice);
                    }

                    // Append to table
                    const row = `
                        <tr class="${rowClass}">
                            <td>${coin}</td>
                            <td>$${currentPrice.toFixed(coin.includes('PEPE') ? 8 : 4)}</td>
                            <td>${rsi.toFixed(2)}</td>
                            <td>$${sma50.toFixed(4)}</td>
                            <td>${signal}</td>
                            <td>${tpSl}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;

                } catch (error) {
                    console.error(`Error fetching data for ${coin}:`, error);
                }
            }
            statusText.innerText = `Scan complete. Waiting for the next cycle... (Last updated: ${new Date().toLocaleTimeString()})`;
        }

        // Simple SMA Calculation
        function calculateSMA(data, period) {
            if (data.length < period) return 0;
            const sum = data.slice(data.length - period).reduce((a, b) => a + b, 0);
            return sum / period;
        }

        // Simple RSI Calculation
        function calculateRSI(data, period) {
            if (data.length < period + 1) return 50;
            let gains = 0, losses = 0;

            for (let i = data.length - period; i < data.length; i++) {
                const diff = data[i] - data[i - 1];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }

            const avgGain = gains / period;
            const avgLoss = losses / period;

            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        // Run Scanner every 1 minute
        scanMarket();
        setInterval(scanMarket, 60000);
    </script>
</body>
</html>
