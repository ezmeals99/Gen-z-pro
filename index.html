<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GenZ Pro - Multi Scanner</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --accent-color: #fcd535;
            --text-color: #eaecef;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* --- 🛠️ Header (Corrected & Mobile Friendly) --- */
        .header {
            background-color: var(--container-bg);
            padding: 10px 15px;
            border-bottom: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column; /* Stack on mobile */
            gap: 10px;
            align-items: center;
        }

        .header-title-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        .header h2 span {
            color: var(--accent-color);
        }

        .header-actions {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Important for wrapping on small screens */
            gap: 8px; /* Consistent gap between buttons */
            padding-bottom: 5px;
        }

        /* Base Button Styles */
        button {
            transition: transform 0.1s ease;
            outline: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 12px;
            padding: 8px 12px;
            box-sizing: border-box;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-logout {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .long-term-wrapper {
            position: relative;
        }

        .btn-long-term {
            background-color: var(--success-color);
            color: #000;
        }

        .red-dot {
            display: none;
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            border: 2px solid var(--container-bg);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .search-container {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .search-input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2b3139;
            color: white;
            width: 100px; /* Small default width */
            outline: none;
            font-size: 12px;
        }

        .btn-search {
            background-color: var(--accent-color);
            color: #000;
        }

        .user-icon, .bell-icon {
            width: 32px;
            height: 32px;
            background-color: #2b3139;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #444;
            transition: 0.2s;
            flex-shrink: 0; /* Prevents shrinking */
        }

        .user-icon:hover, .bell-icon:hover {
            border-color: var(--accent-color);
            background-color: var(--container-bg);
        }

        .user-icon svg, .bell-icon svg {
            fill: var(--accent-color);
            width: 16px;
            height: 16px;
        }

        /* --- 🕹️ Controls (Wallet & Leverage) --- */
        .controls {
            margin: 15px auto;
            padding: 15px;
            background-color: var(--container-bg);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 90%;
            border: 1px solid var(--border-color);
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .controls label {
            font-size: 10px;
            color: #848e9c;
        }

        .controls input[type="number"] {
            background-color: #2b3139;
            color: white;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 5px;
            width: 70px;
            font-size: 12px;
            text-align: center;
        }

        .controls select {
            background-color: #2b3139;
            color: white;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 5px;
            font-size: 12px;
        }

        .slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: #444;
            border-radius: 5px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--accent-color);
            cursor: pointer;
        }

        /* --- 🚀 Scan Button & Grid --- */
        .btn-scan {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 0;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            margin: 10px auto;
            width: 70%;
            max-width: 250px;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            padding: 10px;
            box-sizing: border-box;
            width: 100%;
        }

        .card {
            background-color: var(--container-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: left;
            position: relative;
        }

        .card-symbol {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .card-trend {
            font-weight: bold;
            font-size: 10px;
        }

        .card-price {
            font-size: 22px;
            font-weight: bold;
            margin: 6px 0;
        }

        .targets {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .btn-book {
            width: 100%;
            background-color: var(--success-color);
            color: #000;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }

        /* --- 🔐 Login & Modal --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 17, 0.98);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .login-box {
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--accent-color);
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        .login-box input {
            width: 100%; padding: 8px; margin: 8px 0;
            border-radius: 5px; border: 1px solid #444;
            background-color: #2b3139; color: white; box-sizing: border-box;
            font-size: 14px;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 17, 0.98); z-index: 2000; overflow-y: auto;
        }

        .modal-content {
            max-width: 90%; margin: 20px auto; padding: 10px;
            background-color: var(--container-bg); border-radius: 12px; border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 10px;
        }

        .close-btn { color: #848e9c; font-size: 24px; font-weight: bold; cursor: pointer; }

        /* --- 📱 Mobile Specific Media Query --- */
        @media (max-width: 600px) {
            .header-actions {
                justify-content: space-between; /* Spreads buttons evenly */
            }
            .search-input {
                width: 80px; /* Slightly smaller to fit */
            }
            .controls {
                flex-direction: row; /* Keep elements in a row */
                justify-content: space-around;
                max-width: 95%;
            }
            .grid {
                grid-template-columns: 1fr; /* Single column on very small screens */
            }
        }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<div id="loginOverlay">
    <div class="login-box">
        <h2 id="loginTitle" style="color:var(--accent-color); margin-top:0; font-size: 20px;">GEN Z LOGIN</h2>
        <p style="font-size: 10px; color: #848e9c; margin-bottom: 15px;">Sign in or create account</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-login" style="background-color: var(--accent-color); color: #000; margin-top: 15px;" onclick="attemptLogin()">LOGIN</button>
        <button class="btn-create" style="background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color);" onclick="attemptCreate()">CREATE ACCOUNT</button>
        <div id="loginMsg" style="color:var(--danger-color); font-size:11px; margin-top:10px;"></div>
    </div>
</div>

<div id="appContent" style="display: none;">
    <div class="header">
        <div class="header-title-row">
            <h2>GEN Z PRO <span>SCANNER</span></h2>
        </div>
        
        <div class="header-actions">
            <div class="bell-icon" id="bellIcon" onclick="requestNotifPermission()" title="Enable Notifications" style="display: none;">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2A7,7 0 0,0 5,9V16L3,18V19H21V18L19,16V9A7,7 0 0,0 12,2M12,22A2,2 0 0,0 14,20H10A2,2 0 0,0 12,22Z"/>
                </svg>
            </div>
            
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
            
            <div class="long-term-wrapper">
                <button class="btn-long-term" onclick="loadLongTerm()">LONG TERM</button>
                <div id="notifDot" class="red-dot"></div>
            </div>
            
            <div class="search-container">
                <input type="text" id="sCoin" class="search-input" placeholder="BTC..." onkeypress="if(event.key === 'Enter') searchCoin()">
                <button class="btn-search" onclick="searchCoin()">SEARCH</button>
            </div>
            
            <div class="user-icon" onclick="openBookedTrades()" title="My Booked Trades">
                <svg viewBox="0 0 24 24">
                    <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>WALLET (USDT)</label>
            <input type="number" id="wallet" value="100">
        </div>
        
        <div class="control-group" id="levArea">
            <label>LEV: <span id="levVal" style="color:var(--accent-color); font-weight:bold;">15x</span></label>
            <input type="range" id="lev" min="10" max="20" value="15" class="slider" oninput="document.getElementById('levVal').innerText = this.value + 'x'">
        </div>

        <div class="control-group" id="tfArea">
            <label>TF</label>
            <select id="tf">
                <option value="15m" selected>15m</option>
                <option value="30m">30m</option>
                <option value="1h">1h</option>
                <option value="4h">4h</option>
                <option value="1d">1d</option>
            </select>
        </div>
    </div>

    <button class="btn-scan" id="mainScanBtn" onclick="startScan()">SCAN MARKET</button>
    <div id="status" style="color:var(--accent-color); font-size:11px; margin-bottom:10px;">Ready to Scan...</div>
    
    <div class="grid" id="grid"></div>
</div>

<div id="tradesModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="color:var(--accent-color); margin:0; font-size:16px;">📂 MY BOOKED TRADES</h3>
            <span class="close-btn" onclick="closeBookedTrades()">&times;</span>
        </div>
        <div class="grid" id="trackedGrid" style="padding:0;"></div>
    </div>
</div>

<script>
    let scanInterval;
    let isLongTermView = false;
    const bestCoins = [
        "BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "ADAUSDT", "XRPUSDT",
        "DOGEUSDT", "SHIBUSDT", "NEARUSDT", "AVAXUSDT", "LINKUSDT", "SUIUSDT",
        "PEPEUSDT", "TRXUSDT", "UNIUSDT", "ATOMUSDT", "THETAUSDT", "CRVUSDT"
    ];

    // --- 🔔 NOTIFICATION SYSTEM ---
    window.onload = function() {
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([{u: "alex", p: "123"}]));
        }
        const loggedInUser = localStorage.getItem('current_user');
        if (loggedInUser) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
        }
        if (Notification.permission !== 'granted') {
            document.getElementById('bellIcon').style.display = 'flex';
        }
    };

    function requestNotifPermission() {
        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                alert('Success! You will receive background notifications.');
                document.getElementById('bellIcon').style.display = 'none';
            }
        });
    }

    function triggerAlert(coin, trend, price) {
        document.getElementById('notif-sound').play();
        if (Notification.permission === 'granted') {
            new Notification(`🚀 GenZ Signal: ${coin}`, {
                body: `${trend} signal at $${price}! Check your trades.`,
                icon: 'https://bin.arnu.sh/binance.png'
            });
        }
    }

    // --- 🔐 LOGIN SYSTEM ---
    function attemptLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.find(user => user.u === u && user.p === p)) {
            localStorage.setItem('current_user', u);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
        } else {
            document.getElementById('loginMsg').innerText = "Invalid username/password!";
        }
    }

    function attemptCreate() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (!u || !p) { document.getElementById('loginMsg').innerText = "Fill all fields!"; return; }
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.some(user => user.u === u)) { document.getElementById('loginMsg').innerText = "Username exists!"; return; }
        users.push({u: u, p: p});
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('current_user', u);
        location.reload();
    }
    function logout() { localStorage.removeItem('current_user'); location.reload(); }

    // --- 📊 API LOGIC ---
    async function getCandles(symbol, interval) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
            const data = await res.json();
            return data.map(d => ({close: parseFloat(d[4]), high: parseFloat(d[2]), low: parseFloat(d[3])}));
        } catch (e) { return null; }
    }
    function calculateRSI(closes, period = 14) {
        let gains = 0, losses = 0;
        for (let i = 1; i <= period; i++) {
            let diff = closes[i] - closes[i - 1];
            if (diff >= 0) gains += diff; else losses -= diff;
        }
        let avgGain = gains / period, avgLoss = losses / period;
        for (let i = period + 1; i < closes.length; i++) {
            let diff = closes[i] - closes[i - 1], gain = diff >= 0 ? diff : 0, loss = diff < 0 ? -diff : 0;
            avgGain = (avgGain * (period - 1) + gain) / period; avgLoss = (avgLoss * (period - 1) + loss) /
