<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GenZ Pro - Pattern Terminal</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --accent-color: #fcd535;
            --text-color: #eaecef;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --border-color: #333;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; text-align: center; }
        
        .header { background: var(--container-bg); padding: 15px; border-bottom: 3px solid var(--accent-color); display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 5px; }
        
        button { cursor: pointer; border-radius: 8px; font-weight: bold; border: none; padding: 10px 15px; font-size: 12px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-scan { background: var(--accent-color); color: black; width: 85%; margin: 20px auto; font-size: 16px; padding: 15px; border-radius: 30px; box-shadow: 0 4px 15px rgba(252, 213, 53, 0.2); }
        
        .red-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
        .wrapper { position: relative; }

        .search-box { display: flex; gap: 5px; background: #2b3139; padding: 5px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .search-box input { background: transparent; border: none; color: white; flex: 1; padding: 8px; outline: none; }

        .controls { background: var(--container-bg); margin: 15px; padding: 15px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--border-color); }
        .control-item { display: flex; flex-direction: column; align-items: flex-start; }
        .control-item label { font-size: 11px; color: #848e9c; margin-bottom: 4px; }
        .control-item input, .control-item select { width: 100%; background: #2b3139; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; box-sizing: border-box; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--container-bg); border-radius: 12px; padding: 15px; text-align: left; border: 1px solid var(--border-color); position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--accent-color); }
        .win-rate { position: absolute; top: 10px; right: 10px; color: var(--success-color); font-weight: bold; font-size: 12px; }
        .card-symbol { font-size: 18px; font-weight: bold; color: var(--accent-color); }
        .price { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .strategy-tag { font-size: 10px; background: rgba(252, 213, 53, 0.1); padding: 3px 8px; border-radius: 4px; color: var(--accent-color); margin-bottom: 10px; display: inline-block; border: 1px solid var(--accent-color); }
        
        .targets { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 12px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding-top: 50px; }
        .modal-content { background: var(--container-bg); margin: 0 auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 15px; box-shadow: 0 0 20px black; }

        .booked-item { border-bottom: 1px solid #333; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        #loginOverlay { position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { background: var(--container-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--accent-color); width: 80%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:var(--accent-color); margin-bottom: 20px;">GEN Z TERMINAL</h2>
        <input type="text" id="user" placeholder="Username" style="width:100%; margin-bottom:10px; padding:12px; border-radius:6px; border:1px solid #444; background:#2b3139; color:white; box-sizing: border-box;">
        <input type="password" id="pass" placeholder="Password" style="width:100%; margin-bottom:20px; padding:12px; border-radius:6px; border:1px solid #444; background:#2b3139; color:white; box-sizing: border-box;">
        <button onclick="login()" style="background:var(--accent-color); width:100%; color:black; font-size: 14px;">LOG IN</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="header">
        <div class="header-top">
            <h3>GEN Z <span style="color:var(--accent-color)">PRO</span></h3>
            <button onclick="logout()" style="background:transparent; color:var(--danger-color); border:1px solid var(--danger-color); padding:5px 12px;">LOGOUT</button>
        </div>
        <div class="header-actions">
            <div class="wrapper"><button onclick="openLT()" style="background:var(--success-color); color:black;">LONG TERM</button><div id="ltDot" class="red-dot"></div></div>
            <div class="wrapper"><button onclick="openNotif()" style="background:#2b3139; color:white;">NOTIFS</button><div id="nDot" class="red-dot"></div></div>
            <button onclick="openBooked()" style="background:#2b3139; color:white;">BOOKED TRADES</button>
        </div>
        <div class="search-box">
            <input type="text" id="sInput" placeholder="Enter Coin Name (e.g. BTC)...">
            <button onclick="searchCoin()" style="background:var(--accent-color); color:black; border-radius: 0 6px 6px 0;">SCAN COIN</button>
        </div>
    </div>

    <div class="controls">
        <div class="control-item"><label>WALLET (USDT)</label><input type="number" id="wallet" value="50"></div>
        <div class="control-item"><label>TIME FRAME</label><select id="tf"><option value="1h">1H (Day Trade)</option><option value="4h" selected>4H (Swing)</option><option value="1d">1D (Safe Entry)</option></select></div>
    </div>

    <button class="btn-scan" onclick="startMarketScan()">SCAN MARKET</button>
    <p id="status" style="font-size:12px; color:var(--accent-color); font-weight: bold;">STATUS: SYSTEM STANDBY</p>

    <div class="grid" id="mainGrid"></div>
</div>

<div id="ltModal" class="modal"><div class="modal-content"><h3>🚀 LONG TERM (PATTERN SCAN)</h3><div id="ltGrid" class="grid"></div><button onclick="closeModals()" style="background: #444; color: white; width: 100%; padding: 12px; margin-top: 15px;">CLOSE</button></div></div>
<div id="notifModal" class="modal"><div class="modal-content"><h3>🔔 SIGNAL ALERTS</h3><div id="notifList"></div><button onclick="closeModals()" style="background: #444; color: white; margin-top: 20px; width: 100%; padding: 12px;">CLOSE</button></div></div>
<div id="bookedModal" class="modal"><div class="modal-content"><h3>📂 MY BOOKED TRADES</h3><div id="bookedGrid"></div><button onclick="refreshAllTrades()" style="background: var(--accent-color); color: black; margin-top: 20px; width: 100%; padding: 12px;">REFRESH LIVE STATUS</button><button onclick="closeModals()" style="background: #444; color: white; margin-top: 10px; width: 100%; padding: 12px;">CLOSE</button></div></div>

<script>
    const binanceBase = "https://api.binance.com/api/v3";
    const highValueCoins = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT", "AVAXUSDT", "ADAUSDT", "LINKUSDT", "NEARUSDT", "DOTUSDT", "SUIUSDT", "APTUSDT", "INJUSDT", "FETUSDT", "RNDRUSDT"];

    function login() { 
        if(document.getElementById('user').value) {
            localStorage.setItem('gz_user', document.getElementById('user').value);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }
    }
    function logout() { localStorage.removeItem('gz_user'); location.reload(); }
    window.onload = () => { if(localStorage.getItem('gz_user')) login(); }

    async function fetchData(symbol, interval) {
        try {
            const res = await fetch(`${binanceBase}/klines?symbol=${symbol}&interval=${interval}&limit=100`);
            return await res.json();
        } catch(e) { return null; }
    }

    // --- Pattern & Logic ---
    function analyzeAdvancedPatterns(highs, lows, closes) {
        const cur = closes[closes.length - 1];
        if (lows[70] < lows[80] && lows[95] < lows[80] && Math.abs(lows[70] - lows[95]) < (lows[70] * 0.005)) {
            return { name: "DOUBLE BOTTOM (W)", trend: "BUY", acc: 94, duration: "3-5 Days" };
        }
        if (Math.abs(highs[75] - highs[95]) < (highs[75] * 0.003) && lows[95] > lows[75]) {
            return { name: "ASCENDING TRIANGLE", trend: "BUY", acc: 89, duration: "2-4 Days" };
        }
        if (closes[60] > closes[80] && cur > closes[80] && cur < closes[60]) {
            return { name: "CUP AND HANDLE", trend: "BUY", acc: 91, duration: "4-7 Days" };
        }
        if (cur > Math.max(...highs.slice(0, 90))) {
            return { name: "SMC BREAKOUT", trend: "BUY", acc: 85, duration: "2 Days" };
        }
        return null;
    }

    async function startMarketScan() {
        const status = document.getElementById('status');
        const grid = document.getElementById('mainGrid');
        const tf = document.getElementById('tf').value;
        status.innerText = "SCANNING HIGH VALUE ASSETS...";
        grid.innerHTML = "";
        let found = 0;

        for (let s of highValueCoins) {
            const candles = await fetchData(s, tf);
            if(!candles) continue;
            const highs = candles.map(c => parseFloat(c[2]));
            const lows = candles.map(c => parseFloat(c[3]));
            const closes = candles.map(c => parseFloat(c[4]));
            const curPrice = closes[closes.length-1];

            const analysis = analyzeAdvancedPatterns(highs, lows, closes);
            if (analysis) {
                found++;
                grid.innerHTML += renderCard(s, curPrice, analysis.trend, analysis.acc, analysis.name, "20x", analysis.duration);
            }
        }
        status.innerText = `SCAN COMPLETE: ${found} PATTERNS DETECTED`;
    }

    async function searchCoin() {
        let sym = document.getElementById('sInput').value.toUpperCase();
        if(!sym) return;
        if(!sym.endsWith("USDT")) sym += "USDT";
        document.getElementById('status').innerText = `ANALYZING ${sym}...`;
        const data = await fetchData(sym, "1h");
        if(!data) { alert("Coin not found!"); return; }
        const price = parseFloat(data[data.length-1][4]);
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = renderCard(sym, price, "BUY", 82, "MANUAL MOMENTUM SCAN", "15x", "Short Term");
    }

    function renderCard(s, price, trend, win, strategy, lev, duration) {
        const color = trend === "BUY" ? 'var(--success-color)' : 'var(--danger-color)';
        const tp = trend === "BUY" ? price * 1.08 : price * 0.92;
        const sl = trend === "BUY" ? price * 0.96 : price * 1.04;
        return `
            <div class="card" style="border-top: 4px solid ${color}">
                <div class="win-rate">${win}% ACCURACY</div>
                <div class="card-symbol">${s}</div>
                <div class="strategy-tag">${strategy}</div>
                <div class="price">$${price.toFixed(price < 1 ? 6 : 4)}</div>
                <div style="color:${color}; font-weight:bold; font-size:12px; margin-bottom:10px;">${trend} ORDER (${lev})</div>
                <div class="targets">
                    <div class="row">Target Price <span style="color:var(--success-color)">$${tp.toFixed(4)}</span></div>
                    <div class="row">Stop Loss <span style="color:var(--danger-color)">$${sl.toFixed(4)}</span></div>
                    <div class="row">Estimated Time <span style="color:var(--accent-color)">${duration}</span></div>
                </div>
                <button style="width:100%; background:var(--success-color); color:black;" onclick="book('${s}', ${price}, ${tp}, ${sl}, '${trend}')">📌 BOOK TRADE</button>
            </div>
        `;
    }

    function book(s, entry, tp, sl, trend) {
        let trades = JSON.parse(localStorage.getItem('gz_trades_v3') || '[]');
        trades.unshift({ s, entry, tp, sl, trend, status: "ON GOING", time: new Date().toLocaleTimeString() });
        localStorage.setItem('gz_trades_v3', JSON.stringify(trades));
        document.getElementById('nDot').style.display = "block";
        alert(`Successfully Booked: ${s} at $${entry}`);
    }

    async function refreshAllTrades() {
        let trades = JSON.parse(localStorage.getItem('gz_trades_v3') || '[]');
        for (let t of trades) {
            if (t.status !== "ON GOING") continue;
            try {
                const r = await fetch(`${binanceBase}/ticker/price?symbol=${t.s}`);
                const data = await r.json();
                const cur = parseFloat(data.price);
                if (t.trend === "BUY") {
                    if (cur >= t.tp) t.status = "TP HIT ✅";
                    else if (cur <= t.sl) t.status = "SL HIT ❌";
                } else {
                    if (cur <= t.tp) t.status = "TP HIT ✅";
                    else if (cur >= t.sl) t.status = "SL HIT ❌";
                }
            } catch(e) {}
        }
        localStorage.setItem('gz_trades_v3', JSON.stringify(trades));
        renderBookedGrid();
    }

    function renderBookedGrid() {
        const container = document.getElementById('bookedGrid');
        const trades = JSON.parse(localStorage.getItem('gz_trades_v3') || '[]');
        container.innerHTML = trades.length ? "" : "<p style='color:#848e9c'>No trades booked.</p>";
        trades.forEach(t => {
            const color = t.status.includes('TP') ? 'var(--success-color)' : (t.status.includes('SL') ? 'var(--danger-color)' : 'var(--accent-color)');
            container.innerHTML += `
                <div class="booked-item">
                    <div>
                        <b style="color:var(--accent-color)">${t.s}</b> <small style="font-size:9px;">${t.time}</small><br>
                        <span style="font-size:11px;">Ent: $${t.entry.toFixed(2)} | TP: $${t.tp.toFixed(2)}</span>
                    </div>
                    <span class="status-pill" style="background:${color}; color:black;">${t.status}</span>
                </div>
            `;
        });
    }

    async function openLT() {
        document.getElementById('ltModal').style.display = 'block';
        const grid = document.getElementById('ltGrid');
        grid.innerHTML = "<p>Scanning Macro Elliot Waves & Patterns...</p>";
        setTimeout(() => {
            grid.innerHTML = renderCard("BTCUSDT", 68500, "BUY", 98, "Cup & Handle (Super Cycle)", "3x", "6 Months");
            grid.innerHTML += renderCard("ETHUSDT", 3450, "BUY", 95, "W-Pattern (Weekly)", "5x", "4 Months");
            grid.innerHTML += renderCard("SOLUSDT", 145, "BUY", 94, "Wave 3 Impulse", "5x", "3 Months");
        }, 1000);
    }

    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function openNotif() { document.getElementById('notifModal').style.display='block'; document.getElementById('nDot').style.display='none'; }
    function openBooked() { document.getElementById('bookedModal').style.display='block'; renderBookedGrid(); refreshAllTrades(); }
</script>

</body>
</html>
