<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GenZ Pro - Pattern Terminal</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --accent-color: #fcd535;
            --text-color: #eaecef;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --border-color: #333;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; text-align: center; }

        /* --- UI HEADER (Original Style) --- */
        .header { background-color: var(--container-bg); padding: 15px; border-bottom: 4px solid var(--accent-color); display: flex; flex-direction: column; gap: 12px; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .header h2 span { color: var(--accent-color); }
        
        .user-icon { width: 35px; height: 35px; background-color: #2b3139; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid var(--accent-color); position: relative; }
        .red-dot { position: absolute; top: 0; right: 0; width: 9px; height: 9px; background-color: #ff4d4d; border-radius: 50%; border: 2px solid var(--container-bg); display: none; }

        .search-container { display: flex; gap: 8px; width: 100%; }
        .search-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background-color: #2b3139; color: white; outline: none; }
        .btn-search { background-color: var(--accent-color); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- CONTROLS --- */
        .controls { margin: 15px; padding: 15px; background-color: var(--container-bg); border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid var(--border-color); }
        .control-group { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        .control-group label { font-size: 11px; color: #848e9c; }
        .control-group input, .control-group select { width: 100%; background-color: #2b3139; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; box-sizing: border-box; }

        .btn-scan { background-color: var(--accent-color); color: #000; padding: 15px; border-radius: 30px; font-weight: bold; width: 85%; border: none; margin: 10px auto; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(252, 213, 53, 0.2); }

        /* --- GRID & CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .card { background-color: var(--container-bg); padding: 18px; border-radius: 15px; border: 1px solid var(--border-color); text-align: left; position: relative; }
        .pattern-tag { font-size: 10px; background: rgba(252, 213, 53, 0.1); color: var(--accent-color); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent-color); font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .card-symbol { font-size: 18px; font-weight: bold; display: block; }
        .card-price { font-size: 26px; font-weight: bold; margin: 8px 0; color: #fff; }
        
        .targets { background: rgba(0,0,0,0.25); padding: 12px; border-radius: 10px; margin: 12px 0; font-size: 12px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .btn-book { width: 100%; background-color: var(--success-color); color: #000; padding: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; margin-top: 5px; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--container-bg); border-radius: 18px; padding: 22px; max-width: 450px; margin: auto; border: 1px solid #444; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .booked-item { background: #2b3139; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .status-pill { font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h2>GEN Z <span>PRO</span></h2>
        <div class="user-icon" onclick="openBookedTrades()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent-color)"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <div id="notifDot" class="red-dot"></div>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="sInput" class="search-input" placeholder="Search (e.g. BTC, ETH)...">
        <button class="btn-search" onclick="searchAsset()">SCAN</button>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>WALLET (USDT)</label>
        <input type="number" id="wallet" value="100">
    </div>
    <div class="control-group">
        <label>TIME FRAME</label>
        <select id="tf">
            <option value="1h">1H - Scalping</option>
            <option value="4h" selected>4H - Swing</option>
            <option value="1d">1D - Position</option>
        </select>
    </div>
</div>

<button class="btn-scan" onclick="runMarketAnalysis()">SCAN MARKET</button>
<p id="status" style="font-size: 11px; color: var(--accent-color); font-weight: bold; margin-top: 0;">SYSTEM STATUS: READY</p>

<div class="grid" id="mainGrid">
    <p style="color: #848e9c; font-size: 13px; grid-column: 1/-1;">No active signals. Press SCAN to begin.</p>
</div>

<div id="bookedModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0;">MY TRADES</h3>
            <span onclick="closeModal()" style="cursor:pointer; font-size:28px;">&times;</span>
        </div>
        <div id="bookedList"></div>
        <button onclick="refreshTradeStatus()" style="width:100%; margin-top:15px; padding:12px; background:var(--accent-color); border:none; border-radius:10px; font-weight:bold;">REFRESH LIVE STATUS</button>
    </div>
</div>

<script>
    const binanceURL = "https://api.binance.com/api/v3";
    const assets = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT", "AVAXUSDT", "NEARUSDT", "ADAUSDT", "DOTUSDT", "LINKUSDT"];

    // --- Market Analysis Logic ---
    async function runMarketAnalysis() {
        const grid = document.getElementById('mainGrid');
        const status = document.getElementById('status');
        const tf = document.getElementById('tf').value;
        
        status.innerText = "ALGORITHM SCANNING PATTERNS & LIQUIDITY...";
        grid.innerHTML = "";
        let found = 0;

        for (let s of assets) {
            const data = await fetchLiveKlines(s, tf);
            if (!data) continue;

            const highs = data.map(d => parseFloat(d[2]));
            const lows = data.map(d => parseFloat(d[3]));
            const closes = data.map(d => parseFloat(d[4]));
            const curPrice = closes[closes.length - 1];

            const analysis = detectChartPatterns(highs, lows, closes);
            if (analysis) {
                found++;
                grid.innerHTML += createCard(s, curPrice, analysis);
            }
        }
        status.innerText = `SCAN COMPLETE: FOUND ${found} OPPORTUNITIES`;
    }

    async function fetchLiveKlines(symbol, interval) {
        try {
            const r = await fetch(`${binanceURL}/klines?symbol=${symbol}&interval=${interval}&limit=100`);
            return await r.json();
        } catch(e) { return null; }
    }

    function detectChartPatterns(highs, lows, closes) {
        const cur = closes[closes.length - 1];
        
        // 1. Double Bottom (W Pattern) - Strong Reversal
        if (lows[70] < lows[80] && lows[95] < lows[80] && Math.abs(lows[70] - lows[95]) < (lows[70] * 0.005)) {
            return { name: "W-PATTERN (DOUBLE BOTTOM)", trend: "BUY", acc: 94 };
        }
        // 2. Ascending Triangle - Continuation
        if (Math.abs(highs[75] - highs[95]) < (highs[75] * 0.003) && lows[95] > lows[75]) {
            return { name: "ASCENDING TRIANGLE", trend: "BUY", acc: 88 };
        }
        // 3. Cup and Handle
        if (closes[60] > closes[80] && cur > closes[80] && cur < closes[60]) {
            return { name: "CUP AND HANDLE", trend: "BUY", acc: 91 };
        }
        // 4. SMC Break of Structure (Fallback)
        if (cur > Math.max(...highs.slice(0, 90))) {
            return { name: "SMC BREAKOUT", trend: "BUY", acc: 85 };
        }
        return null;
    }

    function createCard(s, price, a) {
        const tp = price * 1.07;
        const sl = price * 0.95;
        return `
            <div class="card" style="border-top: 4px solid var(--success-color)">
                <div class="pattern-tag">${a.name}</div>
                <span class="card-symbol">${s}</span>
                <div class="card-price">$${price.toFixed(price < 1 ? 6 : 2)}</div>
                <div class="targets">
                    <div class="row">Entry Price <span>$${price.toFixed(2)}</span></div>
                    <div class="row">Take Profit (TP) <span style="color:var(--success-color)">$${tp.toFixed(2)}</span></div>
                    <div class="row">Stop Loss (SL) <span style="color:var(--danger-color)">$${sl.toFixed(2)}</span></div>
                </div>
                <button class="btn-book" onclick="saveTrade('${s}', ${price}, ${tp}, ${sl}, '${a.trend}')">📌 BOOK TRADE</button>
            </div>
        `;
    }

    // --- Booked Trade Management ---
    function saveTrade(s, entry, tp, sl, trend) {
        let list = JSON.parse(localStorage.getItem('genz_v1_trades') || '[]');
        list.unshift({ s, entry, tp, sl, trend, status: "ON GOING", time: new Date().toLocaleTimeString() });
        localStorage.setItem('genz_v1_trades', JSON.stringify(list));
        document.getElementById('notifDot').style.display = 'block';
        alert(`Successfully Booked ${s}! Check your profile.`);
    }

    async function refreshTradeStatus() {
        let trades = JSON.parse(localStorage.getItem('genz_v1_trades') || '[]');
        for (let t of trades) {
            if (t.status !== "ON GOING") continue;
            try {
                const r = await fetch(`${binanceURL}/ticker/price?symbol=${t.s}`);
                const d = await r.json();
                const cur = parseFloat(d.price);

                if (cur >= t.tp) t.status = "TP HIT ✅";
                else if (cur <= t.sl) t.status = "SL HIT ❌";
            } catch(e) {}
        }
        localStorage.setItem('genz_v1_trades', JSON.stringify(trades));
        renderBookedList();
    }

    function renderBookedList() {
        const container = document.getElementById('bookedList');
        const trades = JSON.parse(localStorage.getItem('genz_v1_trades') || '[]');
        container.innerHTML = trades.length ? "" : "<p style='color:#848e9c'>No trades active.</p>";
        
        trades.forEach(t => {
            const color = t.status.includes('TP') ? 'var(--success-color)' : (t.status.includes('SL') ? 'var(--danger-color)' : 'var(--accent-color)');
            container.innerHTML += `
                <div class="booked-item">
                    <div>
                        <b style="color:var(--accent-color)">${t.s}</b> <small style="font-size:9px; color:#848e9c">${t.time}</small><br>
                        <span style="font-size:11px;">Ent: $${t.entry.toFixed(2)} | TP: $${t.tp.toFixed(2)}</span>
                    </div>
                    <div class="status-pill" style="background:${color}; color:#000;">${t.status}</div>
                </div>
            `;
        });
    }

    function openBookedTrades() {
        document.getElementById('bookedModal').style.display = 'block';
        document.getElementById('notifDot').style.display = 'none';
        renderBookedList();
    }

    function closeModal() { document.getElementById('bookedModal').style.display = 'none'; }

    async function searchAsset() {
        let val = document.getElementById('sInput').value.toUpperCase();
        if(!val) return;
        if(!val.endsWith("USDT")) val += "USDT";
        
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "<p style='color:var(--accent-color)'>Scanning Individual Asset...</p>";
        
        const data = await fetchLiveKlines(val, "1h");
        if(!data) { alert("Coin not found!"); return; }
        
        const price = parseFloat(data[data.length-1][4]);
        grid.innerHTML = createCard(val, price, {name: "MANUAL SCAN", trend: "BUY", acc: 80});
    }
</script>

</body>
</html>
