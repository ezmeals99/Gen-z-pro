<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GenZ Pro - High Accuracy Scanner</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --accent-color: #fcd535;
            --text-color: #eaecef;
            --success-color: #0ecb81;
            --danger-color: #f6465d;
            --warning-color: #f0b90b;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* --- 🛠️ Header --- */
        .header {
            background-color: var(--container-bg);
            padding: 10px 15px;
            border-bottom: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .header-title-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { margin: 0; font-size: 18px; color: var(--text-color); }
        .header h2 span { color: var(--accent-color); }

        .header-actions {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 12px;
            padding: 8px 12px;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-logout { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); }
        .btn-long-term { background-color: var(--success-color); color: #000; }
        .btn-notif { background-color: #2b3139; color: var(--text-color); border: 1px solid #444; }

        .red-dot {
            display: none; position: absolute; top: -4px; right: -4px; width: 10px; height: 10px;
            background-color: #ff4d4d; border-radius: 50%; border: 2px solid var(--container-bg);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .search-container { display: flex; gap: 5px; }
        .search-input {
            padding: 8px; border-radius: 6px; border: 1px solid #444;
            background-color: #2b3139; color: white; width: 80px; font-size: 12px;
        }

        .user-icon {
            width: 32px; height: 32px; background-color: #2b3139; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid #444;
        }

        /* --- 🕹️ Controls --- */
        .controls {
            margin: 15px auto; padding: 15px; background-color: var(--container-bg);
            border-radius: 10px; display: flex; justify-content: center; gap: 15px;
            max-width: 90%; border: 1px solid var(--border-color); flex-wrap: wrap;
        }

        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .controls label { font-size: 10px; color: #848e9c; }

        /* --- 🚀 Grid & Cards --- */
        .btn-scan {
            background-color: var(--accent-color); color: #000; padding: 12px 40px;
            border-radius: 30px; font-weight: bold; font-size: 14px; margin: 10px auto; display: block;
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px; padding: 10px; width: 100%; box-sizing: border-box;
        }

        .card {
            background-color: var(--container-bg); padding: 15px; border-radius: 12px;
            border: 1px solid var(--border-color); text-align: left; position: relative;
        }

        .win-rate-tag {
            float: right; font-size: 12px; font-weight: bold; padding: 2px 6px;
            border-radius: 4px; background: rgba(14, 203, 129, 0.2); color: var(--success-color);
        }

        .card-symbol { font-size: 16px; font-weight: bold; }
        .card-price { font-size: 22px; font-weight: bold; margin: 6px 0; }

        .targets { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: 8px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; }

        .btn-book {
            width: 100%; background-color: var(--success-color); color: #000;
            padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 10px;
        }

        .status-badge { float: right; font-size: 11px; font-weight: bold; padding: 3px 6px; border-radius: 4px; }

        /* --- 🔐 Login & Modal --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 17, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box { background-color: var(--container-bg); padding: 25px; border-radius: 12px; border: 2px solid var(--accent-color); width: 280px; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #2b3139; color: #fff; box-sizing: border-box; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 14, 17, 0.98); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 90%; margin: 20px auto; padding: 15px; background-color: var(--container-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        .close-btn { float: right; font-size: 24px; cursor: pointer; color: #848e9c; }

        #customAlert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--container-bg); color: #fff; padding: 12px 25px; border-radius: 8px;
            border-left: 5px solid var(--success-color); z-index: 3000; font-weight: bold;
        }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
<div id="customAlert"></div>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--accent-color); margin:0;">GEN Z PRO</h2>
        <p style="font-size:12px; color:#848e9c;">High Win-Rate Trade Scanner</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button style="background:var(--accent-color); width:100%;" onclick="attemptLogin()">LOGIN</button>
    </div>
</div>

<div id="appContent" style="display: none;">
    <div class="header">
        <div class="header-title-row">
            <h2>GEN Z <span>PRO</span></h2>
            <div class="user-icon" onclick="openBookedTrades()">
                <svg width="20" height="20" fill="var(--accent-color)" viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
            <div style="position:relative;">
                <button class="btn-long-term" onclick="openLongTermModal()">LONG TERM</button>
                <div id="notifDot" class="red-dot"></div>
            </div>
            <button class="btn-notif" onclick="openNotifModal()">🔔 NOTIFS</button>
            <div class="search-container">
                <input type="text" id="sCoin" class="search-input" placeholder="BTC...">
                <button style="background:var(--accent-color);" onclick="searchCoin()">SEARCH</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>WALLET (USDT)</label>
            <input type="number" id="wallet" value="100" style="width:60px; background:#2b3139; color:#fff; border:1px solid #444; border-radius:4px; padding:4px;">
        </div>
        <div class="control-group">
            <label>LEVERAGE</label>
            <select id="lev" style="background:#2b3139; color:#fff; border:1px solid #444; border-radius:4px; padding:4px;">
                <option value="10">10x</option>
                <option value="15" selected>15x</option>
                <option value="20">20x</option>
            </select>
        </div>
        <div class="control-group">
            <label>TIMEFRAME</label>
            <select id="tf" style="background:#2b3139; color:#fff; border:1px solid #444; border-radius:4px; padding:4px;">
                <option value="15m">15m</option>
                <option value="1h" selected>1h</option>
                <option value="4h">4h</option>
            </select>
        </div>
    </div>

    <button class="btn-scan" onclick="startMainScan()">SCAN 85%+ WIN RATE</button>
    <div id="status" style="color:var(--accent-color); font-size:12px; margin:10px;">Ready to find high-probability trades...</div>
    
    <div class="grid" id="grid"></div>
</div>

<div id="tradesModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeBookedTrades()">&times;</span><h3>📂 TRACKED TRADES</h3><div class="grid" id="trackedGrid"></div></div></div>
<div id="longTermModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeLongTermModal()">&times;</span><h3>🚀 LONG TERM (90%+)</h3><div class="grid" id="longTermGrid"></div></div></div>
<div id="notifModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeNotifModal()">&times;</span><h3>🔔 RECENT SIGNALS</h3><div id="notifList" style="text-align:left; padding:10px;"></div></div></div>

<script>
    const filteredCoins = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "XRPUSDT", "ADAUSDT", "AVAXUSDT", "DOGEUSDT", "LINKUSDT", "NEARUSDT", "MATICUSDT", "LTCUSDT", "UNIUSDT", "OPUSDT", "ARBUSDT", "APTUSDT", "TIAUSDT", "PEPEUSDT", "WLDUSDT", "SEIUSDT", "INJUSDT"];
    let signalsHistory = [];

    window.onload = () => {
        if(localStorage.getItem('logged_in')) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            startAutoScanners();
        }
    };

    function attemptLogin() {
        localStorage.setItem('logged_in', true);
        location.reload();
    }
    function logout() { localStorage.removeItem('logged_in'); location.reload(); }

    async function fetchData(url) { try { const r = await fetch(url); return await r.json(); } catch(e) { return null; } }

    function calculateRSI(closes) {
        let gains = 0, losses = 0;
        for (let i = 1; i <= 14; i++) {
            let d = closes[i] - closes[i-1];
            if (d >= 0) gains += d; else losses -= d;
        }
        let avgG = gains/14, avgL = losses/14;
        for (let i = 15; i < closes.length; i++) {
            let d = closes[i] - closes[i-1];
            avgG = (avgG * 13 + (d > 0 ? d : 0)) / 14;
            avgL = (avgL * 13 + (d < 0 ? -d : 0)) / 14;
        }
        return 100 - (100 / (1 + avgG/avgL));
    }

    async function startMainScan() {
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');
        const tf = document.getElementById('tf').value;
        grid.innerHTML = "";
        status.innerText = "Analyzing Market Trends & Volatility...";

        let found = 0;
        for (const symbol of filteredCoins) {
            const data = await fetchData(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=50`);
            if (!data) continue;

            const closes = data.map(d => parseFloat(d[4]));
            const curPrice = closes[closes.length-1];
            const sma = closes.reduce((a,b) => a+b, 0) / closes.length;
            const rsi = calculateRSI(closes);
            
            // Advanced Logic: SMA + RSI + Candle Trend
            let trend = "";
            let accuracy = 0;

            if (curPrice > sma && rsi < 35) { // Oversold in Uptrend
                trend = "BUY";
                accuracy = 85 + (35 - rsi);
            } else if (curPrice < sma && rsi > 65) { // Overbought in Downtrend
                trend = "SELL";
                accuracy = 85 + (rsi - 65);
            }

            if (accuracy >= 85) { // Only show 85%+
                found++;
                accuracy = Math.min(accuracy, 99);
                renderCard(grid, symbol, curPrice, trend, accuracy);
                addSignalToHistory(symbol, trend, accuracy);
            }
        }
        status.innerText = found > 0 ? `Scan Complete. Found ${found} High Accuracy Trades.` : "No 85%+ Win Rate Trades found right now. Try again later.";
    }

    function renderCard(targetGrid, symbol, price, trend, acc) {
        const wallet = parseFloat(document.getElementById('wallet').value);
        const lev = parseInt(document.getElementById('lev').value);
        const color = trend === "BUY" ? "var(--success-color)" : "var(--danger-color)";
        
        // SL & TP Logic
        const movement = price * 0.02; // 2% movement
        const tp = trend === "BUY" ? price + movement : price - movement;
        const sl = trend === "BUY" ? price - (movement * 0.8) : price + (movement * 0.8);
        const estProfit = ((movement / price) * wallet * lev).toFixed(2);

        targetGrid.innerHTML += `
            <div class="card" style="border-top: 3px solid ${color}">
                <span class="win-rate-tag">${acc.toFixed(0)}% WIN RATE</span>
                <div class="card-symbol">${symbol}</div>
                <div style="color:${color}; font-weight:bold; font-size:14px;">${trend} SIGNAL</div>
                <div class="card-price">$${price.toFixed(4)}</div>
                <div class="targets">
                    <div class="row">Est. Profit <span style="color:var(--success-color)">+$${estProfit}</span></div>
                    <div class="row">Target TP <span>$${tp.toFixed(4)}</span></div>
                    <div class="row">Stop Loss <span style="color:var(--danger-color)">$${sl.toFixed(4)}</span></div>
                </div>
                <button class="btn-book" onclick="bookTrade('${symbol}', ${price}, ${tp}, ${sl}, '${trend}')">📌 BOOK TRADE</button>
            </div>
        `;
    }

    function bookTrade(symbol, entry, tp, sl, trend) {
        let trades = JSON.parse(localStorage.getItem('my_trades') || '[]');
        trades.push({ symbol, entry, tp, sl, trend, status: "ON GOING", time: new Date().toLocaleTimeString() });
        localStorage.setItem('my_trades', JSON.stringify(trades));
        showTopAlert(`Trade Booked: ${symbol} ${trend}`);
    }

    async function loadTrackedTrades() {
        const grid = document.getElementById('trackedGrid');
        let trades = JSON.parse(localStorage.getItem('my_trades') || '[]');
        grid.innerHTML = trades.length ? "" : "No trades tracked.";

        for (let i = 0; i < trades.length; i++) {
            let t = trades[i];
            const ticker = await fetchData(`https://api.binance.com/api/v3/ticker/price?symbol=${t.symbol}`);
            const cur = parseFloat(ticker.price);

            if (t.status === "ON GOING") {
                if (t.trend === "BUY") {
                    if (cur >= t.tp) t.status = "TP HIT ✅";
                    else if (cur <= t.sl) t.status = "SL HIT ❌";
                } else {
                    if (cur <= t.tp) t.status = "TP HIT ✅";
                    else if (cur >= t.sl) t.status = "SL HIT ❌";
                }
                trades[i] = t;
                localStorage.setItem('my_trades', JSON.stringify(trades));
            }

            grid.innerHTML += `
                <div class="card">
                    <span class="status-badge" style="background:${t.status.includes('HIT') ? '#444' : 'var(--warning-color)'}">${t.status}</span>
                    <div class="card-symbol">${t.symbol}</div>
                    <div style="font-size:11px;">Entry: $${t.entry.toFixed(4)} | Live: $${cur.toFixed(4)}</div>
                    <div style="font-size:10px; margin-top:5px; color:#848e9c;">TP: ${t.tp.toFixed(4)} | SL: ${t.sl.toFixed(4)}</div>
                    <button style="margin-top:8px; background:transparent; color:var(--danger-color); border:1px solid var(--danger-color); font-size:10px;" onclick="deleteTrade(${i})">Remove</button>
                </div>
            `;
        }
    }

    function deleteTrade(idx) {
        let trades = JSON.parse(localStorage.getItem('my_trades') || '[]');
        trades.splice(idx, 1);
        localStorage.setItem('my_trades', JSON.stringify(trades));
        loadTrackedTrades();
    }

    function showTopAlert(msg) {
        const a = document.getElementById('customAlert');
        a.innerText = msg; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 3000);
    }

    // Modal Handlers
    function openBookedTrades() { document.getElementById('tradesModal').style.display='block'; loadTrackedTrades(); }
    function closeBookedTrades() { document.getElementById('tradesModal').style.display='none'; }
    function openLongTermModal() { document.getElementById('longTermModal').style.display='block'; runLongTermScan(); }
    function closeLongTermModal() { document.getElementById('longTermModal').style.display='none'; }
    function openNotifModal() { document.getElementById('notifModal').style.display='block'; renderNotifs(); }
    function closeNotifModal() { document.getElementById('notifModal').style.display='none'; }

    async function runLongTermScan() {
        const grid = document.getElementById('longTermGrid');
        grid.innerHTML = "Scanning 4H High Probability setups...";
        let found = 0;
        for (const symbol of ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT"]) {
            const data = await fetchData(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=4h&limit=50`);
            if(!data) continue;
            const closes = data.map(d => parseFloat(d[4]));
            const cur = closes[closes.length-1];
            const rsi = calculateRSI(closes);
            if (rsi < 30 || rsi > 70) {
                found++;
                renderCard(grid, symbol, cur, rsi < 30 ? "BUY" : "SELL", 92);
            }
        }
        if(!found) grid.innerHTML = "No Long Term 90%+ setups found at this hour.";
    }

    function addSignalToHistory(symbol, trend, acc) {
        signalsHistory.unshift({ symbol, trend, acc, time: new Date().toLocaleTimeString() });
        if(signalsHistory.length > 10) signalsHistory.pop();
        document.getElementById('notif-sound').play();
    }

    function renderNotifs() {
        const list = document.getElementById('notifList');
        list.innerHTML = signalsHistory.map(s => `
            <div style="border-bottom:1px solid #333; padding:8px 0;">
                <strong>${s.symbol}</strong> - <span style="color:${s.trend==='BUY'?'#0ecb81':'#f6465d'}">${s.trend}</span> 
                (Win Rate: ${s.acc.toFixed(0)}%) <br>
                <small style="color:#848e9c;">Detected at ${s.time}</small>
            </div>
        `).join('') || "No signals detected yet.";
    }

    function startAutoScanners() {
        setInterval(loadTrackedTrades, 30000); // Update prices every 30s
    }

    async function searchCoin() {
        const s = document.getElementById('sCoin').value.toUpperCase();
        if(!s) return;
        const sym = s.includes("USDT") ? s : s + "USDT";
        const grid = document.getElementById('grid');
        grid.innerHTML = "Searching...";
        const data = await fetchData(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
        if(data) {
            grid.innerHTML = "";
            renderCard(grid, sym, parseFloat(data.price), "BUY", 85);
        } else {
            grid.innerHTML = "Coin not found.";
        }
    }
</script>

</body>
</html>
