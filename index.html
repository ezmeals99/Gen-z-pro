<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Trades - Professional Market Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --ash-text: #b0b0b0;
            --accent-green: #00c853;
            --accent-red: #ff3d00;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #0a0a0a;
            border-right: 1px solid var(--border-color);
            position: fixed;
            padding: 20px 0;
        }

        .logo {
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--accent-green);
            margin-bottom: 30px;
        }

        .nav-item {
            padding: 15px 25px;
            color: var(--ash-text);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-item:hover, .nav-item.active {
            background: #1e1e1e;
            color: white;
            border-left: 4px solid var(--accent-green);
        }

        .nav-item i { margin-right: 15px; }

        /* Main Content */
        .main-content {
            margin-left: 240px;
            padding: 30px;
            width: 100%;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-card input {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 5px;
            width: 80%;
            margin-top: 10px;
        }

        /* Scanner Area */
        .scanner-controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-scan {
            background: var(--accent-green);
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-scan:hover { transform: scale(1.05); }

        /* Signal Cards */
        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .signal-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .signal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 5px; height: 100%;
            background: var(--accent-green);
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .win-rate {
            background: rgba(0, 200, 83, 0.2);
            color: var(--accent-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .trade-details {
            font-size: 0.9rem;
            color: var(--ash-text);
            line-height: 1.6;
        }

        .trade-details b { color: white; }

        .action-btns {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-book {
            flex: 1;
            background: #333;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Notifications */
        #notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent-green);
            color: black;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">EZ TRADES</div>
        <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-book"></i> Booked Trades</div>
        <div class="nav-item"><i class="fas fa-bell"></i> Notifications</div>
        <div class="nav-item"><i class="fas fa-user-lock"></i> Login / API</div>
    </div>

    <div class="main-content">
        <div class="header-stats">
            <div class="stat-card">
                <div>Wallet Balance (USDT)</div>
                <input type="number" id="walletAmount" placeholder="Enter Amount" value="50">
            </div>
            <div class="stat-card">
                <div>Active Strategy</div>
                <div style="color: var(--accent-green); font-weight: bold; margin-top: 10px;">SMC + Elliott Wave</div>
            </div>
            <div class="stat-card">
                <div>Current BTC Price</div>
                <div id="btcPrice" style="font-size: 1.2rem; font-weight: bold; margin-top: 10px;">Loading...</div>
            </div>
        </div>

        <div class="scanner-controls">
            <div>
                <h2 style="margin: 0;">Market Scanner</h2>
                <span style="color: var(--ash-text); font-size: 0.8rem;">Real-time Smart Money Analysis</span>
            </div>
            <button class="btn-scan" onclick="runScanner()">RUN LIVE SCAN</button>
        </div>

        <div class="signals-grid" id="signalsGrid">
            </div>
    </div>

    <div id="notification">New High-Probability Signal Found!</div>

    <script>
        // Binance API Connection for Real-time Price
        const btcPriceElement = document.getElementById('btcPrice');
        const btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');

        btcWs.onmessage = (event) => {
            let data = JSON.parse(event.data);
            btcPriceElement.innerText = `$${parseFloat(data.c).toLocaleString()}`;
        };

        function runScanner() {
            const grid = document.getElementById('signalsGrid');
            const wallet = document.getElementById('walletAmount').value;
            grid.innerHTML = '<p>Scanning all timeframes (M15, H1, D1) for Liquidity & Elliott Waves...</p>';

            // Mocking the Logic for SMC & Elliott Wave Scan
            setTimeout(() => {
                grid.innerHTML = '';
                
                // Example Trade 1: SMC Intraday
                createSignalCard("BTC/USDT", "SMC - Break of Structure", "85%", "Buy/Long", "3x", 70500, 68900);
                
                // Example Trade 2: Elliott Wave Long Term
                createSignalCard("ETH/USDT", "Elliott Wave (Wave 3)", "92%", "Buy/Long", "2x", 4200, 3100);
                
                // Example Trade 3: RSI Divergence
                createSignalCard("SOL/USDT", "RSI Bullish Divergence", "78%", "Buy/Long", "5x", 165, 142);

                showNotification();
            }, 2000);
        }

        function createSignalCard(pair, strategy, winRate, type, leverage, tp, sl) {
            const grid = document.getElementById('signalsGrid');
            const card = document.createElement('div');
            card.className = 'signal-card';
            
            card.innerHTML = `
                <div class="signal-header">
                    <h3 style="margin:0">${pair}</h3>
                    <span class="win-rate">${winRate} Win Rate</span>
                </div>
                <div class="trade-details">
                    <p>Strategy: <b>${strategy}</b></p>
                    <p>Type: <b style="color:var(--accent-green)">${type}</b> | Leverage: <b>${leverage}</b></p>
                    <p>Target (TP): <b style="color:var(--accent-green)">$${tp}</b></p>
                    <p>Stop Loss (SL): <b style="color:var(--accent-red)">$${sl}</b></p>
                </div>
                <div class="action-btns">
                    <button class="btn-book" onclick="bookTrade('${pair}')">Book Trade</button>
                    <button class="btn-book" style="background:var(--accent-green); color:black;">Open on Binance</button>
                </div>
            `;
            grid.appendChild(card);
        }

        function bookTrade(pair) {
            alert(pair + " has been added to your Booked Trades.");
        }

        function showNotification() {
            const note = document.getElementById('notification');
            note.style.display = 'block';
            setTimeout(() => { note.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
