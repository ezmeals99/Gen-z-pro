<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenZ Pro - Multi Scanner</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161a22;
            --text-color: #eaecef;
            --accent-color: #00ff88;
            --danger-color: #ff3b30;
            --border-color: #2b3139;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .header h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .header p {
            margin: 5px 0 0 0;
            color: #848e9c;
            font-size: 14px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
        }

        /* Scanner Cards */
        .scanner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.95);
        }

        .symbol {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            color: #fff;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .price.up { color: var(--accent-color); }
        .price.down { color: var(--danger-color); }

        .btn {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .status-bar {
            text-align: center;
            font-size: 12px;
            color: #848e9c;
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>GENZ PRO</h1>
        <p>Live Binance Multi Scanner</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search coin (e.g. BTC, ETH)..." onkeyup="filterCoins()">
    </div>

    <div class="scanner-grid" id="scannerGrid">
        <div style="text-align: center; width: 100%; color: #848e9c;">Loading live markets...</div>
    </div>

    <div class="status-bar" id="statusBar">
        Data updates automatically every 5 seconds.
    </div>

    <script>
        let previousPrices = {};

        // 1. Binance එකෙන් Data ගන්න Function එක
        async function fetchBinanceData() {
            try {
                // USDT Pairs විතරක් පෙන්නන්න ලේසිම විදිය
                const response = await fetch('https://api.binance.com/api/v3/ticker/price');
                const data = await response.json();
                
                // USDT තියෙන ඒවා විතරක් පෙරා ගැනීම
                const usdtPairs = data.filter(item => item.symbol.endsWith('USDT'));
                
                renderCards(usdtPairs);
                document.getElementById('statusBar').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('statusBar').innerText = "Connection Error! Retrying...";
            }
        }

        // 2. Data ටික Screen එකට දාන Function එක
        function renderCards(coins) {
            const grid = document.getElementById('scannerGrid');
            grid.innerHTML = ''; // කලින් තිබුන ඒවා අයින් කරනවා

            coins.forEach(coin => {
                const currentPrice = parseFloat(coin.price).toFixed(coin.price < 1 ? 4 : 2);
                const prevPrice = previousPrices[coin.symbol];
                
                // මිල වැඩි වුනාද අඩු වුනාද බලනවා
                let priceClass = '';
                if (prevPrice) {
                    if (currentPrice > prevPrice) priceClass = 'up';
                    else if (currentPrice < prevPrice) priceClass = 'down';
                }
                
                // ඊළඟ පාර චෙක් කරන්න දැන් මිල සේව් කර ගන්නවා
                previousPrices[coin.symbol] = currentPrice;

                // Card එක හදනවා
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-symbol', coin.symbol);
                card.innerHTML = `
                    <div class="symbol">${coin.symbol.replace('USDT', '')}/USDT</div>
                    <div class="price ${priceClass}">$${currentPrice}</div>
                    <button class="btn" onclick="alert('Checking signals for ${coin.symbol}...')">SCAN</button>
                `;
                grid.appendChild(card);
            });
        }

        // 3. Search කරනකොට Coins පෙරා ගන්න Function එක
        function filterCoins() {
            const input = document.getElementById('searchInput').value.toUpperCase();
            const cards = document.getElementsByClassName('card');

            for (let i = 0; i < cards.length; i++) {
                const symbol = cards[i].getAttribute('data-symbol');
                if (symbol.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // ඇප් එක Open කරපු ගමන් මුලින්ම ලෝඩ් වෙනවා
        fetchBinanceData();

        // තත්පර 5න් 5ට ඉබේම අලුත් මිල ගණන් ලෝඩ් වෙනවා
        setInterval(fetchBinanceData, 5000);
    </script>
</body>
</html>
